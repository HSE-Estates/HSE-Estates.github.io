                const keyMaterial = await window.crypto.subtle.importKey(
                    "raw",
                    enc.encode(password),
                    { name: "PBKDF2" },
                    false,
                    ["deriveBits", "deriveKey"]
                );

                const key = await window.crypto.subtle.deriveKey(
                    {
                        name: "PBKDF2",
                        salt: salt,
                        iterations: 100000,
                        hash: "SHA-256"
                    },
                    keyMaterial,
                    { name: "AES-GCM", length: 256 },
                    true,
                    ["encrypt", "decrypt"]
                );

                const decryptedBuffer = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    key,
                    data
                );

                return dec.decode(decryptedBuffer);
            } catch (e) {
                throw new Error("Decryption failed");
            }
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const password = urlParams.get('page');

            if (password) {
                try {
                    const decryptedHtml = await decryptContent(password);
                    document.open();
                    document.write(decryptedHtml);
                    
                    // Security enhancement: Remove the password from the visible URL bar 
                    // to prevent shoulder-surfing once successfully decrypted.
                    if (window.history.replaceState) {
                        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                        window.history.replaceState({path: cleanUrl}, '', cleanUrl);
                    }
                    
                    document.close();
                } catch (err) {
                    console.error("Authentication failed or corrupted data.");
                }
            }
        };
    </script>
