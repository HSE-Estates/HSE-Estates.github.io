            }

                    }
                    // Show actual failure instead of leaving it totally blank when explicitly trying a password
                    document.body.innerHTML = '<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8fafc;"><div style="background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; max-width: 400px; width: 90%; font-family: system-ui, sans-serif;"><svg style="width: 48px; height: 48px; margin: 0 auto 1rem; color: #ef4444;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg><h2 style="margin: 0 0 0.5rem; color: #0f172a; font-size: 1.25rem; font-weight:700;">Decryption Failed</h2><p style="margin: 0; color: #64748b; font-size: 0.875rem;">The password provided is incorrect or the file data is corrupted. Please refresh the page and try again.</p></div></div>';
                }
            } else {
                // STEALTH MODE: Setup a hidden triple-click trigger to prompt for password
                let clicks = 0;
                let clickTimer;
                document.body.addEventListener('click', () => {
                    clicks++;
                    clearTimeout(clickTimer);
                    if (clicks >= 3) {
                        showPasswordPrompt();
                        clicks = 0;
                    } else {
                        clickTimer = setTimeout(() => { clicks = 0; }, 500);
                    }
                });
                
                function showPasswordPrompt() {
                    if(document.getElementById('stealth-pwd-modal')) return;
                    const div = document.createElement('div');
                    div.id = 'stealth-pwd-modal';
                    div.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.7);display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;z-index:99999;backdrop-filter:blur(4px);opacity:0;transition:opacity 0.2s;';
                    div.innerHTML = '<div style="background:white;padding:24px;border-radius:16px;width:320px;max-width:90%;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);transform:translateY(10px);transition:transform 0.2s;" id="stealth-pwd-box"><h3 style="margin:0 0 8px 0;color:#0f172a;font-size:1.25rem;">Unlock File</h3><p style="margin:0 0 16px 0;color:#64748b;font-size:0.875rem;">Please enter the decryption password.</p><input type="password" id="stealth-pwd-input" style="width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:16px;box-sizing:border-box;outline:none;font-size:1rem;" placeholder="Password..." /><div style="display:flex;gap:8px;"><button id="stealth-pwd-submit" style="flex:1;background:#2563eb;color:white;border:none;padding:12px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;">Unlock</button><button id="stealth-pwd-cancel" style="flex:1;background:#f8fafc;color:#475569;border:1px solid #e2e8f0;padding:12px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;">Cancel</button></div></div>';
                    document.body.appendChild(div);
                    
                    setTimeout(() => {
                        div.style.opacity = '1';
                        document.getElementById('stealth-pwd-box').style.transform = 'translateY(0)';
                    }, 10);
                    
                    document.getElementById('stealth-pwd-input').focus();
                    
                    document.getElementById('stealth-pwd-submit').onclick = () => {
                        const pwd = document.getElementById('stealth-pwd-input').value;
                        if(pwd) window.location.href = window.location.pathname + '?page=' + encodeURIComponent(pwd);
                    };
                    document.getElementById('stealth-pwd-cancel').onclick = () => {
                        div.style.opacity = '0';
                        setTimeout(() => div.remove(), 200);
                    };
                    document.getElementById('stealth-pwd-input').onkeydown = (e) => {
                        if(e.key === 'Enter') document.getElementById('stealth-pwd-submit').click();
                    };
                }
            }
        };
    </script>
</body>
</html>
